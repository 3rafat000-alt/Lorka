# SOFI AI — Master Routing Table (machine-readable)
# Foundation: This table operationalizes Teaching IV (Token Economy) of the Doctrine
# (engine/DOCTRINE.md). Every job runs on three dials: model · effort · caveman.
# Pick the LOWEST setting on each dial that clears the quality bar. Escalate on evidence only.
version: 5.0

# Economic grid (2026-07-01) — ladder: mechanical → workhorse → gatekeeper → deep.
# 80% of routine ops MUST land on mechanical (first line of defense against token drain).
models:
  deep:       { id: claude-opus-4-8,  tier: "🟣", use: "LAST RESORT — 1M-context deep debugging: repo-wide archaeology on unknown-source total failures. FORBIDDEN for routine code-writing." }
  gatekeeper: { id: claude-fable-5,   tier: "🔮", use: "GATEKEEPER — cross-layer full-stack sweeps only: the spec-review hard gate (7 steel rules + Tier-A), race conditions, tangled webhooks, architectural arbitration" }
  workhorse:  { id: claude-sonnet-5,  tier: "🔵", use: "SECOND LINE — clear-cut coding beyond haiku: simple feature code, Blade views, side migrations, tests, reviews" }
  mechanical: { id: claude-haiku-4-5, tier: "🟢", use: "FIRST LINE — light queries, single-file reads, format checks, carved commands, boilerplate, CRUD, commits" }

effort_levels: [low, medium, high, max]   # low=deterministic ... max=irreversible/security-critical
caveman_levels: [lite, full, ultra]       # lite=drop filler ... ultra=telegraphic. code/commits always normal.
# cross-cutting routes below use dedicated skill modes: `review` (caveman-review) and `commit` (caveman-commit).

defaults:
  model: workhorse
  effort: medium
  caveman: full

# ---- read/execute split (token discipline · engine/protocols/04-coordination-registry.md) ----
# The BRAIN LAYER (ceo-sofi + the 5 tier-advisors below) reads the brain, decides, and delegates.
# LEAF specialists get a distilled frozen slice in the RCCF and execute — they NEVER re-read the
# (154 KB+) brain. The registry (_context/REGISTRY.md, via agents/ceo/registry.py) is the
# 1-line-per-artifact index the brain layer scans instead of re-opening artifacts. Biggest token save.

# ---- per-role routes ----
routes:
  ceo-sofi:                    { model: deep,       effort: max,    caveman: full,  budget: "as-needed", gate: "all" }

  # Advisors (one per tier — sole cross-tier gateway, CEO's council)
  tier-0-advisor:                { model: deep,       effort: high,   caveman: full,  budget: "as-needed", gate: "0-2" }
  tier-1-advisor:                { model: deep,       effort: high,   caveman: full,  budget: "as-needed", gate: 3 }
  tier-2-advisor:                { model: deep,       effort: high,   caveman: full,  budget: "as-needed", gate: "2,4" }
  tier-3-advisor:                { model: deep,       effort: high,   caveman: full,  budget: "as-needed", gate: 5 }
  tier-4-advisor:                { model: deep,       effort: high,   caveman: full,  budget: "as-needed", gate: "6-8" }

  # Tier 0 — Strategy & Product Design
  chief-product-strategist:     { model: deep,       effort: high,   caveman: lite,  budget: "5k-8k",   gate: 0 }
  ux-researcher:                { model: deep,       effort: high,   caveman: lite,  budget: "5k-8k",   gate: 1 }
  journey-architect:            { model: deep,       effort: high,   caveman: lite,  budget: "4k-7k",   gate: 1 }
  ui-ux-designer:               { model: workhorse,  effort: medium, caveman: lite,  budget: "3k-6k",   gate: 2 }
  content-strategist:           { model: mechanical, effort: low,    caveman: full,  budget: "1k-3k",   gate: 2 }

  # Tier 1 — Architecture
  principal-system-architect:   { model: deep,       effort: high,   caveman: full,  budget: "4k-6k",   gate: 3 }
  data-schema-engineer:         { model: workhorse,  effort: high,   caveman: full,  budget: "3k-5k",   gate: 3 }
  api-integration-specialist:   { model: workhorse,  effort: medium, caveman: full,  budget: "3k-5k",   gate: 3 }
  security-compliance-architect: { model: deep,      effort: max,    caveman: full,  budget: "3k-5k",   gate: 3 }
  infrastructure-cloud-architect: { model: workhorse, effort: high,   caveman: full,  budget: "3k-5k",   gate: 3 }

  # Tier 2 — Development (5 full-ownership roles, no separate tech lead — Advisor coordinates)
  database-engineer:            { model: workhorse,  effort: high,   caveman: full,  budget: "3k-6k",   gate: 4 }
  api-engineer:                 { model: workhorse,  effort: medium, caveman: ultra, budget: "6k-12k",  gate: 4 }
  backend-blade-engineer:       { model: workhorse,  effort: medium, caveman: ultra, budget: "8k-15k",  gate: 4 }
  frontend-react-engineer:      { model: workhorse,  effort: medium, caveman: ultra, budget: "6k-12k",  gate: 4 }
  mobile-engineer:              { model: workhorse,  effort: high,   caveman: full,  budget: "6k-12k",  gate: 4 }

  # Tier 3 — Quality
  qa-sre-lead:                  { model: workhorse,  effort: high,   caveman: full,  budget: "3k-6k",   gate: 5 }
  automated-testing-engineer:   { model: workhorse,  effort: medium, caveman: full,  budget: "3k-5k",   gate: 5 }
  manual-exploratory-tester:    { model: mechanical, effort: low,    caveman: full,  budget: "1k-3k",   gate: 5 }
  performance-load-analyst:     { model: workhorse,  effort: medium, caveman: full,  budget: "2k-4k",   gate: 5 }
  security-penetration-tester:  { model: deep,       effort: max,    caveman: full,  budget: "3k-6k",   gate: 5 }

  # Tier 4 — Infrastructure
  devops-cloud-lead:            { model: workhorse,  effort: high,   caveman: full,  budget: "3k-6k",   gate: "6-7" }
  cicd-pipeline-engineer:       { model: workhorse,  effort: medium, caveman: ultra, budget: "2k-5k",   gate: "6-7" }
  observability-sre:            { model: workhorse,  effort: medium, caveman: full,  budget: "2k-4k",   gate: 8 }
  release-incident-manager:     { model: workhorse,  effort: high,   caveman: full,  budget: "3k-6k",   gate: "6-8" }

  # Cross-cutting
  code-review:                  { model: workhorse,  effort: medium, caveman: review, budget: "per-diff" }
  commit-message:               { model: mechanical, effort: low,    caveman: commit, budget: "tiny" }
  spec-review-scan:             { model: mechanical, effort: low,    caveman: full, budget: "1k-3k", note: "phase 1 — grep static sweep + gather flagged files + draft SEV skeleton (bump to workhorse only if draft judgment exceeds haiku)" }
  spec-review-gate:             { model: gatekeeper, effort: max,    caveman: off,  budget: "as-needed", note: "phase 2 — Fable 5 hard gate: full context handover, 7 steel rules match, Tier-A vuln check, final SEV report + code approval" }

escalation:
  raise_when:  ["validation fails twice", "requirements contradict", "security/PII/payment surface", "irreversible migration", "CEO arbitration"]
  lower_when:  ["task is spec-complete", "pure pattern-fill", "already verified by higher tier"]
  priority_override:
    CRITICAL: "may bump +1 model tier and +1 effort level"
    LOW:      "capped at workhorse/medium; paused first under contention"
  rule: "always log the chosen route in the <thinking> block, e.g. 'route: workhorse · medium · ultra'"

safety_overrides:   # caveman OFF, normal prose ON for these
  - security warnings
  - irreversible-action confirmations
  - multi-step sequences where fragment order risks misread
  - all code, commit messages, PR bodies

# ── v5 Effort-scaling: fan-out WIDTH by task class (not just model tier) ──────
# The model ladder above prices the model AXIS. This prices the SPAWN-WIDTH axis.
# Anthropic's research system saw BOTH failure directions (a trivial query spawning
# 50 subagents; vague missions causing duplicate parallel work) until they hardcoded
# a task-class -> agent-count table rather than letting the orchestrator infer it.
# Bounded autonomy empirically completes MORE tasks than unbounded (fewer unsafe
# side-effects, less drift). The CEO/Advisor picks the row, states it, and does not
# exceed it without escalating. Coding parallelizes poorly — default narrow.
effort_scaling:
  trivial-fix:      { spawn: 1,     subagents: no,  budget_calls: "1-3",   note: "typo, i18n string, one-line fix, a Blade field. No fan-out, no RCCF ceremony beyond a one-line brief." }
  single-role:      { spawn: 1,     subagents: no,  budget_calls: "3-10",  note: "one specialist owns it end to end (an endpoint, a migration, a screen). Sequential handoff, not fan-out." }
  cross-tier:       { spawn: "2-5", subagents: no,  budget_calls: "per-role", note: "a gate's worth of parallel specialists behind a FROZEN input (Gate 3 schema/api/security, Gate 4 the 5 engineers). Fan out ONLY because the sub-tasks are context-independent." }
  audit-sweep:      { spawn: "3-8", subagents: ok,  budget_calls: "bounded", note: "audit/secure/spec-review sweeps (sofi_scan.py + spec-review.md): parallel read-only dimensions, each blind to the others. Verify findings adversarially before they count." }
  arbitration:      { spawn: 1,     subagents: no,  budget_calls: "as-needed", note: "Fable/Opus deciding one hard question. Depth, not width. Best-of-N only here, where the cost is already justified." }

budgeted_autonomy:
  rule: "every delegation carries a hard ceiling — a scope (which files/paths), a call/attempt budget, and a fail-safe STOP. On breach: stop and escalate, never 'keep trying'. Unbounded agents complete fewer tasks, not more (bounded-autonomy research)."
  hard_stop: "self-correction caps at 3 attempts; the 4th triggers the circuit breaker (00-operating-system.md). This is budgeted autonomy already — v5 names it and extends the ceiling to spawn-width + scope, not just retry-count."
  context_boundary: "spawn parallel specialists ONLY when their sub-tasks are context-INDEPENDENT. Never fan out sequential pipeline phases of the SAME work (plan->build->test of one ticket) — that pays the coordination tax with no parallelism payoff (Anthropic + LangChain)."

# ── v5.1 Adaptive routing — automated TRIGGERS learned from the Claude OSS frontier ──
# The blocks above price the model/effort/width AXES; routing across them was 100%
# human-judged (CEO logs the route in <thinking>). The frontier audit (EVOLUTION.md
# Round 2) surfaced three DETERMINISTIC or CHEAP triggers SOFI lacked — they don't
# replace CEO judgment, they give it floors + a scoring pre-step so the cheapest-that-
# clears-the-bar call isn't purely by feel. Sources (patterns, not stars): claude-code-
# router (longContext threshold + difficulty triage), claude-task-master
# (analyze_project_complexity → expansion depth), oh-my-claudecode (Ralph/UltraQA
# persist-until-green). Grounding: a SIZING score (how hard/how wide) is NOT a
# confidence-in-correctness score — the latter stays behavioral-proxy only (verification
# V4 / grounding G4). These score task size, never "am I sure I'm right."
adaptive_routing:

  # (1) longContext auto-floor (claude-code-router). Deterministic + free. SOFI owns the
  # 1M-ctx tiers (fable/opus) but escalated context-size by hand. A measured crossing now
  # forces the floor UPWARD only — never caps, never down-routes a security surface.
  long_context:
    threshold_tokens: 60000            # measured LIVE context (ccr's default floor)
    force_min_model: gatekeeper        # ≥ threshold → model may not sit below fable (1M ctx)
    rule: "when live context ≥ threshold_tokens the resolved model is raised to at least force_min_model regardless of task class; it is a floor, never a ceiling, and never lowers a route the ladder already set higher."

  # (2) Difficulty triage (claude-code-router dynamic router). Automates 'pick cheapest
  # that clears the bar' with a haiku pre-step — ADVISORY, the CEO mask confirms. Never
  # auto-applies a bump on a safety_overrides surface (that stays normal-prose confirmed).
  difficulty_triage:
    scorer_model: mechanical           # haiku scores; ~nil cost vs the judgment it front-loads
    emits: "{difficulty: 0-1, proposed_tier, one_line_why}"
    bind: "advisory only — the CEO/advisor mask confirms the proposed tier and still logs the final route in <thinking>. A proposed escalation onto a security/irreversible/PII surface is confirmed in normal prose, never silently auto-applied."

  # (3) Complexity → spawn-width (claude-task-master analyze_project_complexity).
  # effort_scaling is a STATIC class→width table; this computes a per-task size score that
  # PICKS the row + whether to subdivide, instead of a fixed lookup. Sizing, not certainty.
  complexity_score:
    scorer_model: mechanical
    scale: "0-1 ≈ files-touched × cross-tier-reach × unknowns"
    bind: "score selects the effort_scaling row — ≤0.3 → trivial-fix/single-role · 0.3–0.6 → cross-tier · ≥0.6 → audit-sweep/arbitration. It may never exceed budgeted_autonomy ceilings; on ≥0.6 touching money/auth/PII, Deep-Audit (full 9 gates) still binds (00-operating-system.md)."

  # (4) remediate — a NAME for the bounded delegate→verify loop (oh-my-claudecode
  # Ralph/UltraQA). NOT a new unbounded 'keep trying': it reuses the existing 3-attempt
  # circuit breaker as its hard stop and still routes each failure through the Gemini desk.
  remediate:
    loop: "delegate → sofi_verify.py --prj <PRJ> (exit 0 = green) → on exit≠0 distil the failure into the next RCCF + route it to the Gemini desk → re-delegate."
    bound: "budgeted_autonomy.hard_stop — caps at 3 attempts; the 4th trips the circuit breaker → escalate (00-operating-system.md §Escalation). Bounded persistence, not a runaway loop."
    use: "a gate whose verify is red and the fix is mechanical/known. UNKNOWN-source total failure uses the opus repo-wide debug path instead — remediate is for known-shape fixes."

  # (5) model: inherit — a permitted leaf model value (VoltAgent subagents). A leaf that
  # must TRACK the caller's tier (e.g. a review that has to match the implementer's model)
  # may set `model: inherit` in its spec frontmatter instead of a hardcoded tier. Use
  # sparingly — the per-role routes above stay the default; inherit is the deliberate
  # exception, not a way to dodge the ladder.
  model_inherit: "allowed frontmatter value for leaves that must match the caller's effort tier; default remains the fixed per-role route."

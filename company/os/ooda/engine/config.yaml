# SOFI OODA Agent Configuration — Token-Efficient v2

agent:
  id: "sofi-default"
  project_id: "PRJ-SAKK"
  project_root: "."  # relative to engine dir, or absolute
  summary_interval_seconds: 3600  # send summary every hour
  max_cycles_without_human: 50

llm:
  reasoning:
    model: "claude-sonnet-5"         # workhorse — matches company/nexus/routing.yaml
    temperature: 0.2
    max_tokens: 4096
  fast:
    model: "claude-haiku-4-5"        # mechanical — matches company/nexus/routing.yaml
    temperature: 0.0
    max_tokens: 1024

memory:
  backend: "chroma"          # chroma | pgvector | inmemory
  chroma:
    path: "/tmp/sofi-memory"
    collection: "sofi_long_term"
  retrieval:
    top_k: 5
    min_similarity: 0.5
    min_importance: 0.2      # filter low-importance memories

reasoning:
  daily_token_limit: 100000  # soft cap -> economy mode
  economy_mode_model: "haiku"

perception:
  webhook_port: 8765
  file_watch_paths:
    - "/home/es3dlll/Desktop/Lorka/projects/PRJ-SAKK/_context"
  file_watch_patterns: ["*.md", "*.php", "*.py"]
  noise_filter:
    ignored_paths:
      - "vendor/"
      - "node_modules/"
      - ".git/"
      - "__pycache__/"
      - "*.log"
      - "*.min.js"
      - "*.min.css"
      - "dist/"
      - "build/"
    low_priority_types: ["typing", "presence_change", "reaction_added"]

tools:
  project_root: "."  # search/tests will use this as root
  safety:
    search_code: "safe"
    run_tests: "medium"
    create_pr: "critical"
    send_update: "safe"

reflection:
  light_every_cycles: 1
  pattern_check_every: 5
  summary_n: 20

logging:
  level: "INFO"
  format: "text"    # text | json
  file: ""          # empty = stdout only

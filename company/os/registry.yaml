# 📇 SOFI OS Tooling Registry — discovery index for all scripts.
# Agents read this to find a tool before writing a new one (Rule 4: don't duplicate).
# Promotion of a script = add its row here + log in DECISIONS.md.
# NOTE: this is the TOOLING index. The ORG index (15 rooms · 105 agents · skills ·
# superpowers) is company/nexus/registry.yaml — query it with `sofi registry`.
version: 2.0

# ── Shared library: importable by every agent that holds Bash. ──
shared_library:
  package: sofi_tools
  entry: "company/os/bin/sofi"
  modules:
    paths:    "resolve workspace + per-project directories (sentinel: CLAUDE.md + company/)"
    registry: "org index loader — agent→room, leads, spec paths, net grants (nexus/registry.yaml)"
    brain:    "read/update STATE·CONTEXT·DECISIONS (universal contract in code)"
    tickets:  "parse/append/close HANDOFFS tickets; next-open; Room Isolation Law validator"
    routing:  "resolve cheapest route (model·effort·caveman) + priority override; ladder 🟢→🔵→🔮→🟣"
    gates:    "9-gate order, no-skip validation, artifact/evidence/room checks (nexus/gates.yaml)"
    guard:    "GOVERNANCE enforcement: scope sandbox, net policy (registry grants), secret scan"
    runlog:   "append-only run log + CONTEXT trace"
    gitops:   "sync·checkpoint·claim·worktree·gate-merge·gate-tag·git-check (06-git-discipline.md)"
    domain:   "<slug>.local via /etc/hosts + shared Caddy :80 Host routing"
    tunnel:   "bounded public URL over the local domain (cloudflared/localtunnel)"

# ── CLI commands (what `sofi <cmd>` exposes). ──
cli_commands:
  projects:    "list project workspaces"
  rooms:       "the 15 rooms: lead · member count · gates — sofi rooms"
  registry:    "print/query the org index          — sofi registry [query]"
  budget:      "effort_scaling + budgeted_autonomy — sofi budget"
  brain:       "show STATE + next open ticket      — sofi brain <PRJ>"
  brain-query: "filter the ticket queue by field   — sofi brain-query <PRJ> status=blocked"
  route:       "cheapest clearing route            — sofi route <agent> [PRIORITY]"
  gate-check:  "4 validators + VERDICT (exit 1)    — sofi gate-check <PRJ>"
  dispatch:    "render delegation prompt           — sofi dispatch <PRJ> [agent]"
  squad:       "parallel delegation for a gate     — sofi squad <PRJ> <gate>  (gates 3·4·5)"
  powers:      "list the team's superpowers        — sofi powers"
  handoff:     "close/flip a ticket                — sofi handoff <PRJ> close <ID>"
  escalate:    "funnel a blocked ticket up         — sofi escalate <PRJ> <ID> <to> \"<reason>\""
  scratch:     "list/purge temp scripts            — sofi scratch <PRJ> [clean]"
  sync:        "git orient: fetch + prj branch     — sofi sync <PRJ> [--push]"
  checkpoint:  "commit early/often + SOFI trailer  — sofi checkpoint <PRJ> \"<msg>\""
  claim:       "soft-lock a shared path            — sofi claim <PRJ> <path>  (release to drop)"
  worktree:    "isolated tree for a squad          — sofi worktree <PRJ> <gate> <squad>"
  gate-merge:  "merge a squad worktree (--no-ff)   — sofi gate-merge <PRJ> <gate> <squad>"
  gate-tag:    "immutable restore point            — sofi gate-tag <PRJ> <gate>"
  git-check:   "git hygiene gate                   — sofi git-check <PRJ>"
  domain:      "local domain (<slug>.local)        — sofi domain init|register|up|down|list|rm|status [PRJ]"
  tunnel:      "public tunnel for a project        — sofi tunnel up|down|list|status [PRJ]  (ops-domain-warden owned)"
  oracle:      "external review desk (push→receive→act) — sofi oracle review --prj PRJ [--json --text ...] | capture | status  (alias: sofi gemini)"
  tools:       "print this registry"
  doctor:      "self-check: library, routing, org registry, 105↔105 agent parity, skills"

# ── Per-role toolkits: scripts owned by one v6 agent. Dirs keep their v5 layout
#    during transition; the OWNER key below is the v6 truth. ──
agent_toolkits:
  brd-ceo:
    - { script: "agents/ceo/route.py",    purpose: "print resolved route for any agent+priority", gate: all }
    - { script: "agents/ceo/ceo_toolkit.py",
        purpose: "CEO console — delegate (RCCF+route+prompt-cache) · inspect/health (tree scan, secret leaks, structural gaps) · comply (guardrails gate)",
        gate: all }
    - { script: "agents/ceo/feature_scan.py",
        purpose: "token-frugal feature locator + 4-pillar pre-flagger (static, 0 model tokens) — powers /sofi-spec-review and /sofi-feature; emits compact JSON/md file-set+preflags so the model reads a skeleton not the tree",
        gate: all }
    - { script: "agents/ceo/sofi_scan.py",
        purpose: "unified static analysis engine (0 model tokens) — modes search·feature·security·design·flow·wiring·all; backs /sofi-audit /sofi-secure /sofi-design-taste /sofi-feature; smart-find, OWASP pre-flags, taste/a11y/RTL, UserFlow (routes→views+orphans), interconnection. Reads never writes",
        gate: all }
  gtw-dispatcher:
    - { script: "agents/ceo/dispatch.py", purpose: "render the delegation prompt for the open ticket (spec paths from nexus/registry.yaml)", gate: all }
  arc-review-architect:
    - { script: "agents/ceo/spec_review_preflight.py",
        purpose: "phase-1 grep sweep + SEV skeleton before the gatekeeper hard gate (/sofi-spec-review)", gate: cross }
  gtw-gatekeeper:
    - { script: "agents/ceo/handoff_validator.py",
        purpose: "ticket/evidence validation support for sofi gate-check (V1 mechanical layer)", gate: cross }
  gtw-external-reviewer:
    - { script: "agents/ceo/gemini_bridge.py",
        purpose: "low-level bridge — pushes reports OUT of the chat into the pinned oracle conversation via CDP-attached user browser (push/capture/status; file|stdin|inline; waits for reply w/ text-stability; capture=grab latest reply WITHOUT re-sending after a timeout; --out saves reply). External service — sanitized reports only, never secrets/PII",
        gate: all }
    - { script: "agents/ceo/gemini_review.py",
        purpose: "oracle desk (automation over gemini_bridge) — one call: sanitize-on-send (redact keys/secrets/.env) -> condense-if-long (weak-net safe) -> push -> resilient capture (re-capture not re-post on timeout) -> parse reply into sections+action_items -> ingest digest into project HANDOFFS. CLI review|capture|status; also `sofi oracle ...`. The team's standard push->receive->act channel",
        gate: all }
    - { script: "agents/ceo/sanitize_gemini_payload.py",
        purpose: "redacts keys/secrets/.env before any byte leaves the machine (07-security-law.md §3)", gate: all }
  knw-reflector:
    - { script: "agents/ceo/reflection_engine.py",
        purpose: "reflection/dreaming engine — scan (0 model tokens) locates NEW learning signals in HANDOFFS history (escalations, circuit-breakers, recurring patterns), dedups vs LESSONS.md; write appends a distilled situation·what-failed·rule lesson to procedural memory. Backs /sofi-reflect. Scheduled/on-demand, never per-turn (per-turn memory updates degrade quality)",
        gate: all }
  dsn-lead:
    - { script: "agents/uiux/uiux_pipeline.py",
        purpose: "Design room's design/a11y console (0 model tokens to locate) — cmds scan·rtl·gate·brief; wires sofi_scan taste+design + an RTL currency-&lrm; check + sofi_verify into one exit-gated pipeline, then emits paste-ready RCCF delegation briefs routing findings to the owning build engineer. Backs company/rooms/03-design/agents/dsn-lead.md. Reads never writes",
        gate: "2,4" }
  arc-system-architect:
    - { script: "agents/tier-1-architecture/principal-system-architect/fossflow_export.py",
        purpose: "render a topology spec into an importable FossFLOW isometric diagram (Design is Truth)", gate: 3 }
  dat-db-engineer:
    - { script: "agents/tier-1-architecture/data-schema-engineer/migration_check.py",
        purpose: "reject any migration whose down/rollback is missing", gate: 3 }
  sec-threat-modeler:
    - { script: "agents/tier-1-architecture/security-compliance-architect/stride_scaffold.py",
        purpose: "generate a STRIDE threat-model skeleton from a feature name", gate: 3 }
  qa-automation-engineer:
    - { script: "agents/tier-3-quality/qa-sre-lead/coverage_gate.py",
        purpose: "fail the build when coverage < 90%", gate: 5 }
  qa-perf-analyst:
    - { script: "agents/tier-3-quality/performance-load-analyst/perf_budget.py",
        purpose: "fail when TTI≥2s or CWV thresholds breached", gate: 5 }
  ops-domain-warden:
    - { script: "agents/devops/caddy_isolation.py",
        purpose: "per-project Caddy vhost isolation for <slug>.local", gate: cross }
  obs-insights-analyst:
    - { script: "agents/tier-4-infrastructure/observe_sentry_loop.py",
        purpose: "gate-8 Sentry loop — SLO breach → auto-filed Gate-1 re-open issue", gate: 8 }

# ── Template for adding a new per-role tool. ──
template: "agents/_TEMPLATE_agent_tool.py"

# ── External power-ups (catalog: company/superpowers/SUPERPOWERS.md;
#    org-index mirror: company/nexus/registry.yaml `superpowers:`).
#    status: proposed | pilot | promoted. Wield only after the doctrine check;
#    promote = flip status + log in DECISIONS.md. No power overrides a gate bar. ──
external_powers:
  fossflow:
    source: "https://github.com/Abrar74774/FossFLOW"
    power: "isometric architecture diagrams from JSON (npm fossflow) — generatable, version-controlled"
    wielders: [arc-system-architect, arc-data-architect, arc-api-architect, arc-infra-architect]
    use: "Gate 3 — emit topology JSON, render, attach to [ID]_Tech_Stack.md"
    tool: "agents/tier-1-architecture/principal-system-architect/fossflow_export.py"
    status: pilot
  taste-skill:
    source: "https://github.com/leonxlnx/taste-skill"
    power: "anti-generic-UI design skills; dials DESIGN_VARIANCE/MOTION_INTENSITY/VISUAL_DENSITY (1-10)"
    wielders: [dsn-lead, dsn-ui-designer, dsn-brand-designer, fnt-css-artisan, bck-blade-engineer]
    use: "Gate 2/4 — invoke the sofi-design-taste skill; set dials per brief; a11y still gated by WCAG 2.2 AA"
    tool: ".claude/skills/sofi-design-taste/SKILL.md  (SOFI-native, no external dep)"
    status: implemented
  agency-agents:
    source: "https://github.com/msitarzewski/agency-agents"
    power: "232-agent / 16-division reference — mined org patterns (escalation chains, parallel squads, per-role success metrics)"
    wielders: [brd-ceo, gtw-dispatcher]
    use: "escalation-chain pattern landed: tickets.escalate() + `sofi escalate` CLI; squads + success_metric frontmatter live in v6"
    status: applied
  armory:
    source: "VoltAgent/awesome-agent-skills · VoltAgent/awesome-claude-code-subagents · wshobson/agents · pm-claude-skills · Citadel"
    power: "skill/subagent marketplaces — search before writing a new agent/skill (Rule 4)"
    wielders: ["all"]
    use: "discovery index for missing capabilities"
    status: reference
  cybersecurity-skills:
    source: "https://github.com/mukul975/Anthropic-Cybersecurity-Skills"
    power: "817 practitioner SKILL.md across 29 domains (MITRE/NIST-mapped) — knowledge-only, read-on-demand"
    wielders: [sec-lead, sec-threat-modeler, sec-appsec-engineer, sec-pentester, sec-authn-engineer, sec-compliance-auditor, sec-incident-responder, brd-cso]
    use: "Gates 3+5 via /sofi-secure — offensive skills on authorized targets only; security output never compressed"
    tool: "company/superpowers/cybersecurity-skills  (vendored, never auto-loaded)"
    status: promoted

# SOFI v6 — Nexus Routing (THE economic grid — machine-readable, single source)
# Foundation: operationalizes Teaching IV (Token Economy) of company/CONSTITUTION.md;
# doctrine text: company/constitution/05-token-economy.md.
# Every job runs on three dials: model · effort · caveman. Pick the LOWEST setting on
# each dial that clears the quality bar. Escalate on evidence only. Log every route.
# SINGLE SOURCE: nothing anywhere hardcodes a model id — sofi_tools.routing reads THIS
# file (v5 debt #1 paid: no stale MODEL_ORDER hardcodes; the gatekeeper tier is reachable).
# `model: inherit` in a spawnable's frontmatter = gatekeeper tier (the session model).
version: 6.0

# ── The ladder: mechanical → workhorse → gatekeeper → deep ────────────────────
# 80%-MECHANICAL RULE: if a task can be carved into a checklist, a grep, a rename, a
# template-fill, or a command sequence, it goes to mechanical — no debate. 80% of
# routine ops MUST land there; the company's median turn costs mechanical-tier money.
models:
  mechanical: { id: claude-haiku-4-5, tier: "🟢", use: "FIRST LINE — 80% of routine ops: light queries, single-file reads, format checks, carved commands, boilerplate, manual QA steps, commits, scans." }
  workhorse:  { id: claude-sonnet-5,  tier: "🔵", use: "SECOND LINE — clear-cut coding beyond mechanical: feature code, Blade/Vue views, migrations, tests, in-room reviews. The default." }
  gatekeeper: { id: claude-fable-5,   tier: "🔮", use: "JUDGMENT TIER — cross-layer full-stack sweeps, the /sofi-spec-review hard gate (7 steel rules + Tier-A), race conditions, tangled webhooks, architectural arbitration, gate verdicts." }
  deep:       { id: claude-opus-4-8,  tier: "🟣", use: "LAST RESORT — 1M-context repo-wide archaeology on unknown-source total failures. FORBIDDEN for routine code-writing. No agent holds deep as a standing route; it is reached only via the arbitration effort class or a CEO-signed escalation." }

effort_levels: [low, medium, high, max]   # low = deterministic … max = irreversible/security-critical
caveman_levels: [lite, full, ultra]       # lite = drop filler … ultra = telegraphic chatter.
caveman_modes: [review, commit, off]      # review = diff-review shorthand · commit = commit-message mode ·
                                          # off = full prose ALWAYS (read-only judgment roles, spec-review gate).
                                          # Code, commits, PR bodies, security text: always normal prose.

defaults:
  model: workhorse
  effort: medium
  caveman: full


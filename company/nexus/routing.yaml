# ── Escalation policy (evidence only, always logged) ──────────────────────────
escalation:
  raise_when:
    - "validation fails twice"
    - "requirements contradict each other"
    - "security / PII / payment surface"
    - "irreversible migration or destructive operation"
    - "cross-room arbitration (brd-arbiter / brd-ceo)"
  lower_when:
    - "task is spec-complete (pure execution of a frozen contract)"
    - "pure pattern-fill / template work"
    - "already verified by a higher tier"
  priority_override:
    CRITICAL: "may bump +1 model tier and +1 effort level — and MUST be able to reach gatekeeper (a workhorse route under CRITICAL lands on gatekeeper, never caps below it)"
    LOW: "capped at workhorse · medium; paused first under contention"
  rule: "always log the chosen route in the <thinking> block AND in STATE.md last_route, e.g. 'route: workhorse · medium · ultra' — an unlogged route is an unauditable expense (gtw-budget-warden flags it)"

safety_overrides:   # caveman OFF, normal prose ON — no dial overrides these
  - security warnings and findings
  - irreversible-action confirmations
  - multi-step sequences where fragment order risks misread
  - all code, commit messages, PR bodies

# ── Effort scaling: SPAWN-WIDTH axis (the model ladder prices the model axis) ──
# Both failure directions are real: a trivial query fanning into dozens of subagents,
# and vague missions causing duplicate parallel work. The dispatcher picks the row,
# states it in the Work Order (01-work-order.md §4), and never exceeds it without
# escalating. Coding parallelizes poorly — default narrow.
effort_scaling:
  trivial-fix:  { spawn: 1,     subagents: no,  budget_calls: "1-3",       note: "typo, i18n string, one-line fix, a single Blade field. No fan-out, one-line brief." }
  single-role:  { spawn: 1,     subagents: no,  budget_calls: "3-10",      note: "one specialist owns it end to end (an endpoint, a migration, a screen). Sequential handoff, not fan-out." }
  cross-room:   { spawn: "2-5", subagents: no,  budget_calls: "per-agent", note: "a gate's worth of parallel rooms behind a FROZEN input (gate 3 arc/dat/sec · gate 4 bck/fnt/mob · gate 5 qa dimensions). Fan out ONLY because the sub-tasks are context-independent." }
  audit-sweep:  { spawn: "3-8", subagents: ok,  budget_calls: "bounded",   note: "/sofi-audit, /sofi-secure, /sofi-spec-review: parallel read-only dimensions, each blind to the others. Verify findings adversarially before they count (Article 03 V2)." }
  arbitration:  { spawn: 1,     subagents: no,  budget_calls: "as-needed", note: "one gatekeeper/deep mind deciding one hard question (brd-arbiter, repo-wide failure archaeology). Depth, not width — the only row where deep tier is reachable." }

budgeted_autonomy:
  rule: "every delegation carries a hard ceiling — a scope (which files/paths), a call/attempt budget, and a fail-safe STOP. On breach: stop and escalate, never 'keep trying'. Unbounded agents complete FEWER tasks, not more."
  circuit_breaker: "self-correction caps at 3 attempts; the 4th failure HALTS and triggers the circuit breaker — structured crash-dump JSON + escalation ticket + await an ADR'd decision (00-operating-system.md §circuit-breaker; dump shape: nexus/bus/escalation.md §3). gtw-budget-warden keeps the trip ledger; every trip is a reflection signal (Article 04)."
  context_boundary: "spawn parallel specialists ONLY when their sub-tasks are context-INDEPENDENT. Never fan out sequential pipeline phases of the SAME work (plan→build→test of one ticket) — that pays the coordination tax with no parallelism payoff."

# Gemini Audit → Specialist Agent Routing
# Auto-dispatch GitHub issues to responsible agents (RCCF)

dispatch_rules:
  # Architecture findings → Principal Architect
  architecture:
    agent: arc-system-architect
    effort: high
    urgency: high
    handoff_template: |
      **Issue:** {finding}
      **Recommendation:** {recommendation}
      **File:** {file}

      Review architecture against CLAUDE.md + company/CONSTITUTION.md.
      Return: approved / needs-revision / escalate

  # Security findings → Security Architect
  security:
    agent: sec-lead
    effort: high
    urgency: critical  # money-safety takes priority
    handoff_template: |
      **Vulnerability:** {finding}
      **Fix:** {recommendation}
      **File:** {file}

      Threat model assessment required.
      Return: risk-level + remediation-steps

  # Build findings → Backend room Lead (gateway; routes internally to bck-* specialists)
  PRJ-SAKK:
    agent: bck-lead
    effort: medium
    urgency: high
    handoff_template: |
      **Finding:** {finding}
      **Context:** Gate 6 (Staging/UAT) → Gate 7 (Prod)
      **Recommendation:** {recommendation}

      Is this a blocker for prod? Risk if shipped untouched?
      Return: gate-readiness assessment

  # Infrastructure findings → DevOps Lead
  infrastructure:
    agent: ops-lead
    effort: medium
    urgency: medium
    handoff_template: |
      **Component:** {finding}
      **Current:** {file}
      **Improvement:** {recommendation}

      Scale risk? Reliability risk?
      Return: remediation-plan

  # Code patterns → QA Lead
  code:
    agent: qa-lead
    effort: medium
    urgency: medium
    handoff_template: |
      **Pattern Issue:** {finding}
      **Files:** {file}
      **Recommendation:** {recommendation}

      Test coverage impact? Regression risk?
      Return: test-plan

  # Teaching VII → CEO
  Teaching VII:
    agent: brd-ceo
    effort: high
    urgency: high
    handoff_template: |
      **Protocol Finding:** {finding}
      **Status:** {recommendation}

      Binding protocol compliance OK?
      Return: approval + next-enforcement-step

# Priority override: blockers go to CEO immediately
severity_escalation:
  "🔴":
    to_agent: brd-ceo
    urgency: critical
    action: immediate-review-or-escalate

# GitHub issue labels → routing
label_dispatch:
  blocker: critical-path
  good-pattern: documentation-only
  clarification-needed: review-required

# Success criteria
verification:
  requires_test_pass: true
  requires_code_review: true
  requires_architecture_approval: true  # Gemini oracle = binding
  requires_security_clearance: true

# Handoff tracking
tracking:
  commit_message_format: "fix(audit): {finding} [Gemini→{agent}→PR#{pr}]"
  status_check: github-issue-comments
  completion_signal: issue-closed-with-PR
  audit_trail: git-log + GitHub-timeline

# ── Skills (invokable /name — 13, rebuilt for v6 paths) ─────────────────────
skills:
  - name: sofi-boot
    path: .claude/skills/sofi-boot/SKILL.md
    purpose: "orient — git sync + load the active project brain (STATE/HANDOFFS/CONTEXT)"
  - name: sofi-team
    path: .claude/skills/sofi-team/SKILL.md
    purpose: "roster picker — 15 rooms · 105 agents, who does what, exact spawn id"
  - name: sofi-delegate
    path: .claude/skills/sofi-delegate/SKILL.md
    purpose: "build a paste-ready RCCF v3 Work Order for any agent (constitution/01-work-order.md)"
  - name: sofi-gate
    path: .claude/skills/sofi-gate/SKILL.md
    purpose: "gate-bar check & advance — sofi gate-check + gtw-gatekeeper fresh-context verify"
  - name: sofi-handoff
    path: .claude/skills/sofi-handoff/SKILL.md
    purpose: "close work the disciplined way — artifact → checkpoint → brain → next ticket"
  - name: sofi-audit
    path: .claude/skills/sofi-audit/SKILL.md
    purpose: "layered inspection (ui/blade/css/js/db/api/integration/agents/all), grep-first"
  - name: sofi-spec-review
    path: .claude/skills/sofi-spec-review/SKILL.md
    purpose: "arc-review-architect 4-pillar feature review, 7 steel rules, SEV-report-first"
  - name: sofi-feature
    path: .claude/skills/sofi-feature/SKILL.md
    purpose: "full loop on one feature — scan → review → fix → verify → report → gate → handoff"
  - name: sofi-secure
    path: .claude/skills/sofi-secure/SKILL.md
    purpose: "security squad — threat/pentest/scan/verify, wires the cyber armory"
  - name: sofi-fix
    path: .claude/skills/sofi-fix/SKILL.md
    purpose: "route findings → cheapest specialist → checkpoint each fix"
  - name: sofi-report
    path: .claude/skills/sofi-report/SKILL.md
    purpose: "durable evidence-backed writeup to the brain, bilingual-ready (EN/AR)"
  - name: sofi-reflect
    path: .claude/skills/sofi-reflect/SKILL.md
    purpose: "scheduled dreaming — distil HANDOFFS history into _context/LESSONS.md"
  - name: sofi-design-taste
    path: .claude/skills/sofi-design-taste/SKILL.md
    purpose: "anti-generic UI — 3 taste dials + brand presets; a11y always wins"

# ── Tools (executable layer — company/os) ────────────────────────────────────
tools:
  shared_library:
    name: sofi_tools
    path: company/os/sofi_tools
    modules: [paths, brain, tickets, routing, gates, guard, runlog, gitops, domain, tunnel]
    law: company/os/GOVERNANCE.md
  cli:
    name: sofi
    path: company/os/bin/sofi
    verbs: [projects, rooms, registry, budget, brain, brain-query, route, gate-check,
            dispatch, squad, powers, handoff, escalate, scratch, sync, checkpoint,
            claim, release, worktree, gate-merge, gate-tag, git-check, domain, tunnel,
            oracle, tools, doctor]
    note: "v5 alias `sofi gemini` resolves to `sofi oracle`"
  scaffolder:
    path: company/os/bin/new-project.sh
    purpose: "scaffold projects/<PRJ-XXXX>/ — brain, dirs, prj branch, <slug>.local domain"
  scanners:  # Python locates, the model judges (05-token-economy.md §2).
             # Toolkit dirs keep their v5 layout during transition; owner = v6 agent id.
    - name: feature_scan
      path: company/os/toolkit/ceo/feature_scan.py
      owner: brd-ceo
      use: "static feature sweep feeding /sofi-feature and /sofi-spec-review"
    - name: sofi_scan
      path: company/os/toolkit/ceo/sofi_scan.py
      owner: brd-ceo
      use: "layered codebase scan feeding /sofi-audit"
    - name: spec_review_preflight
      path: company/os/toolkit/ceo/spec_review_preflight.py
      owner: arc-review-architect
      use: "phase-1 grep sweep + SEV skeleton before the gatekeeper hard gate"
    - name: dispatch
      path: company/os/toolkit/ceo/dispatch.py
      owner: gtw-dispatcher
      use: "renders the delegation block for the open ticket (sofi dispatch)"
    - name: reflection_engine
      path: company/os/toolkit/ceo/reflection_engine.py
      owner: knw-reflector
      use: "mechanical signal location for /sofi-reflect (0-token candidate finding)"
    - name: handoff_validator
      path: company/os/toolkit/ceo/handoff_validator.py
      owner: gtw-gatekeeper
      use: "ticket/evidence validation support for sofi gate-check"
    - name: oracle_review
      path: company/os/toolkit/ceo/gemini_review.py
      owner: gtw-external-reviewer
      use: "oracle desk driver — sanitize → condense → push → capture → parse → ingest"
    - name: oracle_bridge
      path: company/os/toolkit/ceo/gemini_bridge.py
      owner: gtw-external-reviewer
      use: "low-level pinned-chat bridge under oracle_review"
    - name: oracle_sanitizer
      path: company/os/toolkit/ceo/sanitize_gemini_payload.py
      owner: gtw-external-reviewer
      use: "redacts keys/secrets/.env before any byte leaves the machine (Article 07 §3)"
    - name: fossflow_export
      path: company/os/toolkit/gate/fossflow_export.py
      owner: arc-system-architect
      use: "gate-3 isometric component/infra diagrams as version-controlled JSON"
    - name: migration_check
      path: company/os/toolkit/gate/migration_check.py
      owner: dat-db-engineer
      use: "reversibility check — migration without rollback = rejected"
    - name: stride_scaffold
      path: company/os/toolkit/gate/stride_scaffold.py
      owner: sec-threat-modeler
      use: "STRIDE threat-model scaffold for the gate-3 security bundle"
    - name: coverage_gate

# SOFI v6 — Nexus Registry (the machine index of the Company of Rooms)
# ONE read discovers every room, agent, skill, tool, and superpower.
# Law: company/CONSTITUTION.md · shape: company/nexus/NEXUS.md §1.
# Consumers: sofi registry · sofi rooms · sofi doctor (105↔105 spawnable/spec parity) ·
#   sofi_tools.tickets.validate_room_boundary() (agent→room map, fail-open on unknown ids) ·
#   guard.assert_net_allowed (web-holding roles = agents whose tools include WebSearch/WebFetch) ·
#   dashboard (org graph, registry-driven) · /sofi-team.
# NOTE — routes: the `route`/`budget` fields below are convenience MIRRORS for one-read
#   discovery. The single source of routing truth is company/nexus/routing.yaml (routes.<id>);
#   on any drift routing.yaml wins and `sofi doctor` flags the mismatch.
# NOTE — tools: `inherit` = the agent omits the tools block in its spawnable frontmatter and
#   inherits the full session toolset (boardroom + room Leads). Workers carry explicit minimal grants.
